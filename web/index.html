<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miko Player</title>
  <meta name="description" content="Miko Player — A beautiful web-based music player with synced lyrics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- AMBIENT BACKGROUND -->
  <div class="ambient-bg">
    <div class="ambient-bg-img" id="ambientBgImg"></div>
    <div class="ambient-bg-overlay"></div>
  </div>

  <!-- Client Audio Engine -->
  <audio id="clientAudio" autoplay></audio>

  <!-- MAIN CONTAINER -->
  <div class="app-container">

    <!-- HEADER -->
    <header class="header" id="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
        <span class="logo-text">Miko</span>
      </div>
      <div class="header-accent"></div>
      <button id="queueToggleBtn" class="queue-toggle-btn" title="Up Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 6h13" />
          <path d="M8 12h13" />
          <path d="M8 18h13" />
          <path d="M3 6h.01" />
          <path d="M3 12h.01" />
          <path d="M3 18h.01" />
        </svg>
      </button>
    </header>

    <!-- MAIN CONTENT WRAPPER -->
    <main class="main-content">
      <!-- PLAYLIST ICONS SIDEBAR -->
      <div class="playlist-icons-sidebar" id="playlistIconsSidebar"></div>

      <!-- LEFT/CENTER CONTENT -->
      <div class="left-center-content">
        <!-- HOME VIEW (Search + Dashboard) -->
        <div id="homeView" class="dashboard-rows-container">
          <!-- SEARCH BAR -->
          <section class="search-section" id="searchSection">
            <div class="search-wrapper">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              <input type="text" id="searchInput" class="search-input" placeholder="What do you want to listen to?"
                autocomplete="off" />
              <button id="searchBtn" class="search-btn" title="Search & Play">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z" />
                </svg>
              </button>
            </div>
            <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
          </section>

          <!-- DYNAMIC DASHBOARD SECTIONS -->
          <div class="dashboard-rows" id="dashboardRows">
            <!-- Dynamic rows (history and genre mixes) injected by JS -->
          </div>
        </div>

        <!-- PLAYLIST / DETAIL VIEW -->
        <div id="playlistView" class="playlist-detail-view" style="display: none;">
          <!-- Injected dynamically by library.js -->
        </div>
      </div>

      <!-- NOW PLAYING -->
      <section class="player-section" id="playerSection">
        <div class="artwork-container" id="artworkContainer">
          <div class="artwork-glow" id="artworkGlow"></div>
          <div class="artwork" id="artwork">
            <div class="artwork-placeholder" id="artworkPlaceholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
              </svg>
            </div>
            <img id="artworkImg" class="artwork-img" alt="" />
          </div>
          <div class="disc-ring" id="discRing"></div>
        </div>

        <div class="song-info">
          <h1 class="song-title" id="songTitle">Search a song to play</h1>
          <p class="song-artist" id="songArtist">—</p>
        </div>

        <div class="lyrics-panel" id="lyricsPanel">
          <div class="lyrics-scroll" id="lyricsScroll">
            <p class="lyrics-placeholder" id="lyricsPlaceholder">Lyrics will appear here…</p>
          </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section">
          <span class="time-label" id="timeElapsed">0:00</span>
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <span class="time-label" id="timeDuration">0:00</span>
        </div>

        <!-- Controls with Like & Add buttons -->
        <div class="controls">
          <button class="ctrl-btn ctrl-action" id="likeBtn" title="Like">
            <svg id="iconHeartOutline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
            <svg id="iconHeartFilled" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
          </button>

          <button class="ctrl-btn" id="prevBtn" title="Previous Track">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button class="ctrl-btn ctrl-main" id="playPauseBtn" title="Play / Pause">
            <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="6" y="5" width="4" height="14" rx="1" />
              <rect x="14" y="5" width="4" height="14" rx="1" />
            </svg>
          </button>
          <button class="ctrl-btn" id="nextBtn" title="Next Track">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
            </svg>
          </button>
          <button class="ctrl-btn ctrl-action" id="addToPlaylistBtn" title="Add to Playlist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>

        <!-- Play Mode Toggle -->
        <div class="play-mode-section">
          <button class="play-mode-btn active" id="playModeBtn" title="Play Mode">
            <span id="playModeIcon">✨</span>
            <span id="playModeLabel">Smart Shuffle</span>
          </button>
        </div>
      </section>
    </main>

    <!-- QUEUE PANEL -->
    <section class="queue-panel" id="queuePanel">
      <div class="queue-header">
        <h3>Up Next</h3>
        <button id="closeQueueBtn" class="close-btn" title="Close Queue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="queue-list" id="queueList"></div>
    </section>

    <!-- SIDEBAR PANEL (Left) -->
    <section class="sidebar-panel" id="sidebarPanel">
      <div class="sidebar-header">
        <h3>Your Library</h3>
        <button id="closeSidebarBtn" class="close-btn" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="sidebar-content" id="sidebarContent">
        <!-- Dynamic content injected by JS -->
      </div>
    </section>

  </div>

  <!-- MODAL OVERLAY (for create playlist, add to playlist, etc.) -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal-card" id="modalCard">
      <!-- Dynamic modal content -->
    </div>
  </div>

  <script src="app.js"></script>
  <script src="library.js"></script>
</body>

</html>
