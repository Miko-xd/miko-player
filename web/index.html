<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miko Player</title>
  <meta name="description" content="Miko Player — A beautiful web-based music player with synced lyrics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══════════════════════ AMBIENT BACKGROUND ═══════════════════════ -->
  <div class="ambient-bg">
    <div class="ambient-bg-img" id="ambientBgImg"></div>
    <div class="ambient-bg-overlay"></div>
  </div>

  <!-- Client Audio Engine -->
  <audio id="clientAudio" autoplay></audio>

  <!-- ═══════════════════════ MAIN CONTAINER ═══════════════════════ -->
  <div class="app-container">

    <!-- HEADER -->
    <header class="header" id="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
        <span class="logo-text">Miko</span>
      </div>
      <div class="header-accent"></div>
      <button id="queueToggleBtn" class="queue-toggle-btn" title="Up Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 6h13" />
          <path d="M8 12h13" />
          <path d="M8 18h13" />
          <path d="M3 6h.01" />
          <path d="M3 12h.01" />
          <path d="M3 18h.01" />
        </svg>
      </button>
    </header>

    <!-- SEARCH BAR -->
    <section class="search-section" id="searchSection">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="What do you want to listen to?"
          autocomplete="off" />
        <button id="searchBtn" class="search-btn" title="Search & Play">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
        </button>
      </div>
      <!-- Search suggestions dropdown -->
      <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
    </section>

    <!-- NOW PLAYING -->
    <section class="player-section" id="playerSection">
      <!-- Album Art / Visualizer -->
      <div class="artwork-container" id="artworkContainer">
        <div class="artwork-glow" id="artworkGlow"></div>
        <div class="artwork" id="artwork">
          <div class="artwork-placeholder" id="artworkPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 18V5l12-2v13" />
              <circle cx="6" cy="18" r="3" />
              <circle cx="18" cy="16" r="3" />
            </svg>
          </div>
          <img id="artworkImg" class="artwork-img" alt="" />
        </div>
        <!-- Spinning disc ring -->
        <div class="disc-ring" id="discRing"></div>
      </div>

      <!-- Song Info -->
      <div class="song-info">
        <h1 class="song-title" id="songTitle">Search a song to play</h1>
        <p class="song-artist" id="songArtist">—</p>
      </div>

      <!-- Lyrics Panel -->
      <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyrics-scroll" id="lyricsScroll">
          <p class="lyrics-placeholder" id="lyricsPlaceholder">Lyrics will appear here…</p>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section">
        <span class="time-label" id="timeElapsed">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time-label" id="timeDuration">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="stopBtn" title="Stop">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2" />
          </svg>
        </button>
        <button class="ctrl-btn" id="prevBtn" title="Previous Track">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>
        <button class="ctrl-btn ctrl-main" id="playPauseBtn" title="Play / Pause">
          <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="5" width="4" height="14" rx="1" />
            <rect x="14" y="5" width="4" height="14" rx="1" />
          </svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Next Track">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>
        <div class="volume-wrap">
          <button class="ctrl-btn" id="volumeBtn" title="Volume">
            <svg id="iconVolume" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
          </button>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80" />
        </div>
      </div>
    </section>

    <!-- QUEUE PANEL (Slide out from right) -->
    <section class="queue-panel" id="queuePanel">
      <div class="queue-header">
        <h3>Up Next</h3>
        <button id="closeQueueBtn" class="close-btn" title="Close Queue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="queue-list" id="queueList">
        <!-- Queue items injected by JS -->
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>

</html>
